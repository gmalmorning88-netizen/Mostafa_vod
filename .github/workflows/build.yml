name: Build Android APK
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libsqlite3-dev lld libffi-dev libssl-dev zlib1g-dev libunwind-dev build-essential autoconf libtool pkg-config
          pip install --upgrade pip
          pip install buildozer cython virtualenv

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build with Buildozer
        run: |
          # تفعيل خيار قبول التراخيص التلقائي المدمج في بيئة buildozer
          export APP_ANDROID_ACCEPT_LICENSES=1
          buildozer android debug
