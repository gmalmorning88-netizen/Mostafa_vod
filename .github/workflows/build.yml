name: Build Android APK
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libsqlite3-dev lld libffi-dev libssl-dev zlib1g-dev libunwind-dev
          pip install --upgrade pip
          pip install buildozer cython virtualenv

      - name: Build with Buildozer
        run: |
          yes | buildozer android debug 2>&1 | tee buildozer.log || true
          echo "=========================================="
          echo "=== LAST 100 LINES OF BUILDOZER LOG ==="
          echo "=========================================="
          tail -n 100 buildozer.log 2>/dev/null || echo "Log file not found"
          echo "=========================================="
          echo "=== SEARCHING FOR ERRORS ==="
          echo "=========================================="
          grep -i "error\|failed\|exception\|fatal" buildozer.log 2>/dev/null | tail -n 20 || echo "Could not search log"
          exit 1

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Vodafone-App-APK
          path: bin/*.apk
